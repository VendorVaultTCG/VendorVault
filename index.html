<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#080b12" />
  <title>VendorVault</title>
  <style>
    :root {
      --bg: #070a12; --panel: #101827; --panel2: #151f32; --text: #f8fafc;
      --muted: #a8b3c7; --border: rgba(255,255,255,.12); --yellow:#f7c600;
      --blue:#2f89ff; --green:#42d392; --red:#ff5c6c; --purple:#a78bfa;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: radial-gradient(circle at top,#1b2745,var(--bg) 42%);
      color: var(--text); font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    .app { width:min(1120px,100%); margin:0 auto; padding:14px; padding-bottom:104px; }
    .topbar,.section-head,.hero-content,.actions { display:flex; justify-content:space-between; align-items:center; gap:12px; }
    .eyebrow,.label { margin:0 0 4px; color:var(--yellow); font-size:.76rem; font-weight:950; letter-spacing:.12em; text-transform:uppercase; }
    h1 { margin:0; font-size:clamp(1.5rem,5vw,2.7rem); }
    h2,h3 { margin:0 0 12px; } p { margin-top:0; }
    .card,.stat {
      background:linear-gradient(180deg,var(--panel),var(--panel2)); border:1px solid var(--border);
      border-radius:22px; padding:16px; box-shadow:0 12px 30px rgba(0,0,0,.25); margin-bottom:12px;
    }
    .hero { border-color:rgba(247,198,0,.38); }
    .stats { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:12px; }
    .stat span { display:block; color:var(--muted); font-size:.86rem; }
    .stat strong { display:block; margin-top:7px; font-size:1.45rem; }
    .grid { display:grid; gap:12px; } .two { grid-template-columns:1fr 1fr; }
    form { display:grid; gap:10px; }
    input,select,textarea,button { width:100%; border-radius:14px; border:1px solid var(--border); padding:13px 14px; font:inherit; }
    textarea { min-height:76px; resize:vertical; }
    input,select,textarea { background:#070b13; color:var(--text); }
    button { background:var(--yellow); color:#050505; border:0; font-weight:950; cursor:pointer; }
    button.secondary { background:var(--blue); color:white; } button.ghost { background:transparent; color:var(--text); border:1px solid var(--border); }
    button.danger { background:var(--red); color:white; } button.success { background:var(--green); color:#03130b; }
    button.purple { background:var(--purple); color:#08040f; } button.small { padding:9px 11px; font-size:.85rem; width:auto; }
    button:disabled { opacity:.45; cursor:not-allowed; }
    .stack { display:grid; gap:10px; } .list { display:grid; gap:10px; margin-top:10px; }
    .item { background:rgba(255,255,255,.045); border:1px solid var(--border); border-radius:18px; padding:14px; }
    .item-title { font-weight:950; font-size:1.07rem; margin-bottom:5px; }
    .item-meta { color:var(--muted); line-height:1.55; font-size:.94rem; }
    .badges { display:flex; gap:6px; flex-wrap:wrap; margin-top:10px; }
    .badge { display:inline-flex; border-radius:999px; padding:5px 9px; font-size:.74rem; font-weight:950; background:rgba(66,211,146,.14); color:var(--green); }
    .badge.category { background:rgba(47,137,255,.14); color:#8fc4ff; }
    .badge.sold { background:rgba(255,92,108,.14); color:var(--red); }
    .badge.lot { background:rgba(247,198,0,.14); color:var(--yellow); }
    .badge.purple { background:rgba(167,139,250,.14); color:var(--purple); }
    .item-actions { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:13px; }
    .tabs {
      position:fixed; bottom:0; left:0; right:0;
      display:grid; grid-template-columns:repeat(5,1fr); gap:6px;
      background:rgba(7,10,18,.98); backdrop-filter:blur(16px);
      border-top:1px solid var(--border);
      padding:10px 8px max(10px, env(safe-area-inset-bottom));
      z-index:10;
    }
    .tab {
      background:transparent; color:var(--muted); border:0; border-radius:16px;
      padding:10px 4px; font-size:.8rem; min-height:54px;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px;
      line-height:1.05;
    }
    .tab .tab-icon { font-size:1.25rem; line-height:1; }
    .tab .tab-label { font-size:.72rem; font-weight:950; }
    .tab.active { background:rgba(247,198,0,.18); color:var(--yellow); box-shadow:0 0 0 1px rgba(247,198,0,.22) inset; }
    .filters { display:flex; gap:8px; overflow-x:auto; padding:12px 0; }
    .filter { white-space:nowrap; background:rgba(255,255,255,.06); color:var(--text); border:1px solid var(--border); padding:10px 12px; }
    .filter.active { background:var(--yellow); color:#050505; }
    .report { white-space:pre-line; line-height:1.65; } .muted { color:var(--muted); } .hidden { display:none; }
    dialog { width:min(440px,92vw); background:var(--panel); color:var(--text); border:1px solid var(--border); border-radius:20px; }
    dialog::backdrop { background:rgba(0,0,0,.65); }
    .scan-preview { max-width:100%; border-radius:16px; border:1px solid var(--border); margin-top:10px; }
    .notice { border-left:4px solid var(--yellow); padding:12px; background:rgba(247,198,0,.08); border-radius:12px; color:var(--muted); }
    @media (min-width:800px){ .stats{grid-template-columns:repeat(4,1fr);} .grid.two{grid-template-columns:1fr 1fr;} .tabs{position:sticky;top:0;margin-bottom:12px;border:1px solid var(--border);border-radius:18px;} }
    @media (max-width:560px){ .topbar,.hero-content,.section-head,.actions{align-items:stretch;flex-direction:column;} .item-actions{grid-template-columns:1fr;} }
  </style>
</head>
<body>
  <main id="app" class="app"></main>

  <script>
    const STORAGE_KEY = "vendorVaultWeekendReleaseV1";
    const defaultState = {
      inventory: [], lots: [], activeShow: null, sales: [], reports: [],
      settings: { tab: "dashboard", filter: "All", hideSold: false }
    };
    let state = loadState();
    let selectedItemId = null;
    let scanImageData = "";

    function loadState() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) return structuredClone(defaultState);
      try { return { ...structuredClone(defaultState), ...JSON.parse(saved) }; }
      catch { return structuredClone(defaultState); }
    }
    function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
    function id(){ return crypto.randomUUID(); }
    function money(v){ return Number(v||0).toLocaleString("en-US",{style:"currency",currency:"USD"}); }
    function today(){ return new Date().toLocaleDateString("en-US"); }
    function esc(t){ return String(t||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;"); }
    function getLot(x){ return state.lots.find(l => l.id === x || l.name.toLowerCase() === String(x||"").toLowerCase()); }
    function lotItems(lotId){ return state.inventory.filter(i => i.lotId === lotId); }
    function weightedCost(lot, market){ return Number(lot?.totalPaid||0) && Number(lot?.totalMarket||0) ? (Number(market||0)/Number(lot.totalMarket))*Number(lot.totalPaid) : 0; }
    function currentSales(){ return state.activeShow ? state.sales.filter(s => s.showId === state.activeShow.id) : []; }
    function saleRevenue(s){ return Number(s.soldPrice||0)*Number(s.quantitySold||1); }
    function saleProfit(s){ const item = state.inventory.find(i => i.id === s.itemId); return saleRevenue(s) - Number(item?.weightedCost||0)*Number(s.quantitySold||1) - Number(s.fee||0); }
    function invMarket(){ return state.inventory.reduce((sum,i)=>sum+Number(i.marketValue||0)*Number(i.quantity||0),0); }
    function invCost(){ return state.inventory.reduce((sum,i)=>sum+Number(i.weightedCost||0)*Number(i.quantity||0),0); }

    function render(){
      document.getElementById("app").innerHTML = `
        <header class="topbar">
          <div><p class="eyebrow">VendorVault Weekend Release</p><h1>${title()}</h1></div>
          <button class="ghost" onclick="exportBackup()">Export</button>
        </header>
        <nav class="tabs">
          ${tab("dashboard","🏠","Home")}${tab("inventory","📦","Inventory")}${tab("scanner","📸","Scan")}${tab("show","🎪","Shows")}${tab("more","⚙️","More")}
        </nav>
        ${page()}
        ${sellDialog()}
      `;
      attachEvents();
      saveState();
    }

    function title(){ return ({dashboard:"Command Center",inventory:"Inventory",lots:"Lots & Weighted Cost",scanner:"Scanner Intake",show:"Shows",reports:"Reports",more:"More"})[state.settings.tab] || "VendorVault"; }
    function tab(key,icon,label){ return `<button class="tab ${state.settings.tab===key?"active":""}" onclick="goTab('${key}')"><span class="tab-icon">${icon}</span><span class="tab-label">${label}</span></button>`; }
    function page(){
      if(state.settings.tab==="inventory") return inventoryPage();
      if(state.settings.tab==="scanner") return scannerPage();
      if(state.settings.tab==="show") return showPage() + reportsPreviewPage();
      if(state.settings.tab==="more") return morePage();
      if(state.settings.tab==="lots") return lotsPage();
      if(state.settings.tab==="reports") return reportsPage();
      return dashboardPage();
    }

    function dashboardPage(){
      const sales=currentSales(), revenue=sales.reduce((s,x)=>s+saleRevenue(x),0), gross=sales.reduce((s,x)=>s+saleProfit(x),0);
      const profit = state.activeShow ? gross - Number(state.activeShow.tableFee||0) : gross;
      return `
        <section class="hero card"><div class="hero-content"><div>
          <p class="label">Active Show</p><h2>${esc(state.activeShow?.name || "No show started")}</h2>
          <p class="muted">${state.activeShow ? `${esc(state.activeShow.location||"No location")} • Table fee ${money(state.activeShow.tableFee)}` : "Start a show to track revenue, profit, fees, and payment methods."}</p>
        </div><div class="stack"><button onclick="goTab('show')">Manage Show</button><button class="secondary" onclick="endShow()">End Show</button></div></div></section>
        <section class="stats">
          <div class="stat"><span>Show Revenue</span><strong>${money(revenue)}</strong></div>
          <div class="stat"><span>Show Profit</span><strong>${money(profit)}</strong></div>
          <div class="stat"><span>Inventory Value</span><strong>${money(invMarket())}</strong></div>
          <div class="stat"><span>Cost Basis</span><strong>${money(invCost())}</strong></div>
        </section>
        <section class="grid two">
          <div class="card"><h3>Vendor Vision</h3><p class="muted">Unrealized gain/loss: <strong>${money(invMarket()-invCost())}</strong></p><p class="muted">Lots: <strong>${state.lots.length}</strong></p><p class="muted">Inventory items: <strong>${state.inventory.length}</strong></p></div>
          <div class="card"><h3>Scanner Status</h3><p class="notice">Photo intake is ready. Full auto-recognition comes next with private backend + JustTCG pricing API.</p></div>
        </section>`;
    }

    function inventoryPage(){
      let items=[...state.inventory];
      if(state.settings.hideSold) items=items.filter(i=>Number(i.quantity||0)>0);
      if(state.settings.filter!=="All") items=items.filter(i=>i.category===state.settings.filter);
      return `
        <section class="card"><h3 id="itemFormTitle">Quick Add Inventory</h3><form id="itemForm">
          <input type="hidden" name="editingId" />
          <input name="name" placeholder="Card/Product name" required />
          <select name="category"><option>Singles</option><option>Sealed</option><option>Slabs</option><option>Accessories</option><option>3D Prints</option><option>Other</option></select>
          <select name="lotId"><option value="">No lot / manual cost</option>${state.lots.map(l=>`<option value="${l.id}">${esc(l.name)}</option>`).join("")}</select>
          <input name="quantity" type="number" min="1" step="1" value="1" required />
          <input name="weightedCost" type="number" step="0.01" placeholder="Weighted cost per item" required />
          <input name="marketValue" type="number" step="0.01" placeholder="Current market value" required />
          <input name="stickerPrice" type="number" step="0.01" placeholder="Sticker price" />
          <textarea name="notes" placeholder="Notes"></textarea>
          <div class="actions"><button type="submit" id="saveItemBtn">Add Item</button><button type="button" class="ghost hidden" id="cancelEditBtn" onclick="render()">Cancel Edit</button></div>
        </form></section>
        <section class="card"><h3>Bulk Paste Add</h3><p class="muted">Format: Name, Category, Qty, Cost, Market, Sticker, Lot Name</p><textarea id="bulkPaste" placeholder="Prismatic Booster Bundle, Sealed, 3, 29.23, 98.44, 95, LOT-001"></textarea><button id="bulkAddBtn">Add Bulk Items</button></section>
        <section class="card"><div class="section-head"><h3>Inventory</h3><button class="ghost small" onclick="toggleHideSold()">${state.settings.hideSold ? "Show Sold" : "Hide Sold"}</button></div>
          <div class="filters">${["All","Singles","Sealed","Slabs","Accessories","3D Prints","Other"].map(f=>`<button class="filter ${state.settings.filter===f?"active":""}" onclick="setFilter('${f}')">${f}</button>`).join("")}</div>
          <div class="list">${items.length ? items.map(inventoryCard).join("") : `<p class="muted">No inventory yet.</p>`}</div></section>`;
    }

    function inventoryCard(item){
      const qty=Number(item.quantity||0), sticker=Number(item.stickerPrice||item.marketValue||0), profit=sticker-Number(item.weightedCost||0);
      return `<div class="item"><div class="item-title">${esc(item.name)}</div><div class="item-meta">Qty: <strong>${qty}</strong><br>Cost: <strong>${money(item.weightedCost)}</strong> • Market: <strong>${money(item.marketValue)}</strong> • Sticker: <strong>${money(sticker)}</strong><br>Profit at sticker: <strong>${money(profit)}</strong>${item.notes?`<br>Notes: ${esc(item.notes)}`:""}</div>
      <div class="badges"><span class="badge ${qty<=0?"sold":""}">${qty<=0?"sold out":"available"}</span><span class="badge category">${esc(item.category||"Other")}</span>${item.lotName?`<span class="badge lot">${esc(item.lotName)}</span>`:""}${item.lastMarketUpdate?`<span class="badge purple">Updated ${esc(item.lastMarketUpdate)}</span>`:""}</div>
      <div class="item-actions"><button ${qty<=0?"disabled":""} onclick="openSellDialog('${item.id}')">Mark Sold</button><button class="secondary" onclick="editItem('${item.id}')">Edit</button><button class="ghost" onclick="duplicateItem('${item.id}')">Duplicate</button><button class="danger" onclick="deleteItem('${item.id}')">Delete</button></div></div>`;
    }

    function lotsPage(){
      return `<section class="card"><h3>Create Lot / Collection Buy</h3><form id="lotForm"><input name="name" placeholder="LOT-001" required /><input name="totalPaid" type="number" step="0.01" placeholder="Total paid" required /><input name="totalMarket" type="number" step="0.01" placeholder="Original total market value" required /><textarea name="notes" placeholder="Notes"></textarea><button type="submit">Create Lot</button></form></section>
      <section class="card"><h3>Weighted Cost Calculator</h3><p class="muted">Formula: item market ÷ lot market × lot paid.</p></section>
      <section class="card"><h3>Your Lots</h3><div class="list">${state.lots.length ? state.lots.map(lotCard).join("") : `<p class="muted">No lots yet.</p>`}</div></section>`;
    }
    function lotCard(lot){
      const items=lotItems(lot.id), remaining=items.reduce((s,i)=>s+Number(i.marketValue||0)*Number(i.quantity||0),0);
      const sold=state.sales.filter(s=>items.some(i=>i.id===s.itemId)).reduce((sum,s)=>sum+saleRevenue(s),0);
      const buyPct=Number(lot.totalMarket||0)?Number(lot.totalPaid)/Number(lot.totalMarket)*100:0;
      const recovered=Number(lot.totalPaid||0)?sold/Number(lot.totalPaid)*100:0;
      return `<div class="item"><div class="item-title">${esc(lot.name)}</div><div class="item-meta">Paid: <strong>${money(lot.totalPaid)}</strong> • Original Market: <strong>${money(lot.totalMarket)}</strong><br>Buy %: <strong>${buyPct.toFixed(1)}%</strong> • Cost Recovered: <strong>${recovered.toFixed(1)}%</strong><br>Items: <strong>${items.length}</strong> • Sold Revenue: <strong>${money(sold)}</strong><br>Remaining Market: <strong>${money(remaining)}</strong>${lot.notes?`<br>Notes: ${esc(lot.notes)}`:""}</div><div class="item-actions"><button onclick="addToLot('${lot.id}')">Add Item</button><button class="secondary" onclick="viewLot('${lot.id}')">View</button><button class="danger" onclick="deleteLot('${lot.id}')">Delete</button></div></div>`;
    }

    function scannerPage(){
      return `<section class="card"><h3>Scanner Intake</h3><p class="notice">Take a photo, assign to a lot, confirm details, and add to inventory. Auto-detection comes next.</p><form id="scanForm">
        <select name="lotId"><option value="">No lot / manual cost</option>${state.lots.map(l=>`<option value="${l.id}">${esc(l.name)}</option>`).join("")}</select>
        <input id="scanPhoto" name="photo" type="file" accept="image/*" capture="environment" /><div id="scanPreviewWrap"></div>
        <input name="name" placeholder="Card/product name" required /><input name="setInfo" placeholder="Set / card number" />
        <select name="category"><option>Singles</option><option>Sealed</option><option>Slabs</option><option>Other</option></select>
        <input name="quantity" type="number" min="1" step="1" value="1" required /><input name="marketValue" type="number" step="0.01" placeholder="Market value" required /><input name="stickerPrice" type="number" step="0.01" placeholder="Sticker price" /><textarea name="notes" placeholder="Condition / variant / notes"></textarea><button type="submit">Add Scanned Item</button></form></section>
        <section class="card"><h3>Auto-Scan Backend Plan</h3><p class="muted">Next build: image → AI vision → JustTCG pricing → auto-filled inventory item → weighted cost.</p></section>`;
    }

    function showPage(){
      const sales=currentSales();
      return `<section class="card"><h3>Start Show</h3><form id="showForm">
        <label class="muted">Show Name</label><input name="showName" placeholder="Example: Texas TCG Expo" required />
        <label class="muted">Location</label><input name="location" placeholder="Example: Austin, TX" />
        <label class="muted">Table Fee</label><input name="tableFee" type="number" step="0.01" placeholder="0.00" value="0" />
        <label class="muted">Starting Cash Drawer</label><input name="cashStart" type="number" step="0.01" placeholder="0.00" value="0" />
        <button type="submit">${state.activeShow?"Replace Active Show":"Start Show"}</button></form></section>
      <section class="card"><h3>Active Show</h3><p class="muted">${state.activeShow?`${esc(state.activeShow.name)} • ${esc(state.activeShow.location||"No location")}`:"No active show."}</p><button class="secondary" onclick="endShow()">End Show & Create Report</button></section>
      <section class="card"><h3>Sales Log</h3><div class="list">${sales.length?sales.slice().reverse().map(saleRow).join(""):`<p class="muted">No sales yet.</p>`}</div></section>`;
    }
    function saleRow(sale){ const item=state.inventory.find(i=>i.id===sale.itemId); return `<div class="item"><div class="item-title">${esc(item?.name||"Deleted item")}</div><div class="item-meta">Qty ${sale.quantitySold} • ${money(sale.soldPrice)} each • ${esc(sale.paymentMethod)}<br>Profit: <strong>${money(saleProfit(sale))}</strong></div></div>`; }

    function reportsPage(){ return `<section class="card"><div class="section-head"><h3>Reports</h3>${state.reports.length?`<button class="danger small" onclick="clearReports()">Clear Reports</button>`:""}</div><div class="list">${state.reports.length?state.reports.map(r=>`<div class="item"><div class="report">${esc(r.text)}</div><button class="danger" onclick="deleteReport('${r.id}')">Delete Report</button></div>`).join(""):`<p class="muted">No reports yet.</p>`}</div></section><section class="card"><h3>Data Backup</h3><button onclick="exportBackup()">Export VendorVault Backup</button></section>`; }


    function reportsPreviewPage(){
      return `<section class="card"><h3>Recent Reports</h3><div class="list">${state.reports.length?state.reports.slice(0,2).map(r=>`<div class="item report">${esc(r.text)}</div>`).join(""):`<p class="muted">No completed reports yet.</p>`}</div><button class="ghost" onclick="goTab('reports')">View All Reports</button></section>`;
    }

    function morePage(){
      return `<section class="card"><h3>More Tools</h3><div class="list">
        <button onclick="goTab('lots')">📁 Lots & Weighted Cost</button>
        <button onclick="goTab('reports')" class="secondary">📊 Reports</button>
        <button onclick="exportBackup()" class="ghost">⬇️ Export Backup</button>
      </div></section>
      <section class="card"><h3>Cleanup Tools</h3><div class="list">
        <button class="danger" onclick="deleteActiveShow()">Delete Active Show</button>
        <button class="danger" onclick="clearReports()">Clear Reports</button>
        <button class="danger" onclick="clearSalesOnly()">Clear Sales / Demo Show Data</button>
        <button class="danger" onclick="factoryReset()">Factory Reset Everything</button>
      </div><p class="muted">Use these if you need to remove demo shows, reports, or start fresh.</p></section>
      <section class="card"><h3>Coming Next</h3><p class="muted">Price sync, AI scanner, CSV export, cloud backup, and native app packaging.</p></section>`;
    }

    function sellDialog(){ return `<dialog id="sellDialog"><form method="dialog" id="sellForm"><h3>Mark Sold</h3><p id="sellItemName" class="muted"></p><input name="quantitySold" type="number" min="1" step="1" value="1" required /><input name="soldPrice" type="number" step="0.01" placeholder="Sold price per item" required /><select name="paymentMethod" required><option value="">Payment method</option><option>Cash</option><option>Square</option><option>Venmo</option><option>PayPal</option><option>Cash App</option><option>Zelle</option><option>Trade</option></select><input name="fee" type="number" step="0.01" placeholder="Total fee, if any" value="0" /><textarea name="saleNotes" placeholder="Sale notes"></textarea><menu><button class="ghost" type="button" onclick="document.getElementById('sellDialog').close()">Cancel</button><button type="submit">Save Sale</button></menu></form></dialog>`; }

    function attachEvents(){
      const itemForm=document.getElementById("itemForm"); if(itemForm) itemForm.addEventListener("submit", saveItem);
      const bulkBtn=document.getElementById("bulkAddBtn"); if(bulkBtn) bulkBtn.addEventListener("click", bulkAdd);
      const lotForm=document.getElementById("lotForm"); if(lotForm) lotForm.addEventListener("submit", saveLot);
      const scanPhoto=document.getElementById("scanPhoto"); if(scanPhoto) scanPhoto.addEventListener("change", previewScan);
      const scanForm=document.getElementById("scanForm"); if(scanForm) scanForm.addEventListener("submit", saveScan);
      const showForm=document.getElementById("showForm"); if(showForm) showForm.addEventListener("submit", saveShow);
      const sellForm=document.getElementById("sellForm"); if(sellForm) sellForm.addEventListener("submit", saveSale);
    }

    function saveItem(e){
      e.preventDefault(); const data=new FormData(e.target), editingId=data.get("editingId"), lot=getLot(data.get("lotId")), market=Number(data.get("marketValue")||0);
      const payload={name:data.get("name").trim(),category:data.get("category"),lotId:lot?.id||"",lotName:lot?.name||"",quantity:Number(data.get("quantity")||1),weightedCost:lot?weightedCost(lot,market):Number(data.get("weightedCost")||0),marketValue:market,stickerPrice:Number(data.get("stickerPrice")||market||0),notes:data.get("notes").trim(),lastMarketUpdate:today()};
      if(editingId){ const item=state.inventory.find(i=>i.id===editingId); if(item) Object.assign(item,payload); } else { state.inventory.push({id:id(),createdAt:new Date().toISOString(),...payload}); }
      render();
    }
    function bulkAdd(){
      const text=document.getElementById("bulkPaste").value.trim(); if(!text) return;
      text.split("\n").map(r=>r.split(",").map(c=>c.trim())).filter(r=>r.length>=6).forEach(r=>{
        const [name,category,qty,cost,market,sticker,lotName]=r, lot=lotName?getLot(lotName):null, mv=Number(market||0);
        state.inventory.push({id:id(),name,category:category||"Other",quantity:Number(qty||1),weightedCost:lot?weightedCost(lot,mv):Number(cost||0),marketValue:mv,stickerPrice:Number(sticker||market||0),lotId:lot?.id||"",lotName:lot?.name||lotName||"",notes:"Bulk added",createdAt:new Date().toISOString(),lastMarketUpdate:today()});
      }); render();
    }
    function saveLot(e){ e.preventDefault(); const d=new FormData(e.target); state.lots.push({id:id(),name:d.get("name").trim(),totalPaid:Number(d.get("totalPaid")||0),totalMarket:Number(d.get("totalMarket")||0),notes:d.get("notes").trim(),createdAt:new Date().toISOString()}); render(); }
    function previewScan(e){ const file=e.target.files?.[0]; if(!file) return; const reader=new FileReader(); reader.onload=()=>{ scanImageData=reader.result; document.getElementById("scanPreviewWrap").innerHTML=`<img class="scan-preview" src="${scanImageData}" alt="Scan preview" />`; }; reader.readAsDataURL(file); }
    function saveScan(e){ e.preventDefault(); const d=new FormData(e.target), lot=getLot(d.get("lotId")), mv=Number(d.get("marketValue")||0); state.inventory.push({id:id(),name:d.get("name").trim(),category:d.get("category"),lotId:lot?.id||"",lotName:lot?.name||"",quantity:Number(d.get("quantity")||1),weightedCost:lot?weightedCost(lot,mv):mv,marketValue:mv,stickerPrice:Number(d.get("stickerPrice")||mv||0),notes:`${d.get("setInfo")?d.get("setInfo")+" • ":""}${d.get("notes")||"Scanner intake"}`,imageData:scanImageData,createdAt:new Date().toISOString(),lastMarketUpdate:today()}); scanImageData=""; state.settings.tab="inventory"; render(); }
    function saveShow(e){ e.preventDefault(); const d=new FormData(e.target); state.activeShow={id:id(),name:d.get("showName").trim(),location:d.get("location").trim(),tableFee:Number(d.get("tableFee")||0),cashStart:Number(d.get("cashStart")||0),startedAt:new Date().toISOString()}; render(); }
    function saveSale(e){ e.preventDefault(); const item=state.inventory.find(i=>i.id===selectedItemId); if(!item||!state.activeShow) return; const d=new FormData(e.target), qty=Number(d.get("quantitySold")||1); if(qty>Number(item.quantity||0)){ alert("You cannot sell more than available quantity."); return; } state.sales.push({id:id(),showId:state.activeShow.id,itemId:item.id,quantitySold:qty,soldPrice:Number(d.get("soldPrice")||0),paymentMethod:d.get("paymentMethod"),fee:Number(d.get("fee")||0),notes:d.get("saleNotes")||"",soldAt:new Date().toISOString()}); item.quantity=Number(item.quantity||0)-qty; document.getElementById("sellDialog").close(); render(); }

    function goTab(t){ state.settings.tab=t; render(); }
    function setFilter(f){ state.settings.filter=f; render(); }
    function toggleHideSold(){ state.settings.hideSold=!state.settings.hideSold; render(); }
    function openSellDialog(itemId){ if(!state.activeShow){ alert("Start a show first."); goTab("show"); return; } const item=state.inventory.find(i=>i.id===itemId); if(!item) return; selectedItemId=itemId; const dialog=document.getElementById("sellDialog"); dialog.showModal(); document.getElementById("sellItemName").textContent=`${item.name} • Qty ${item.quantity} • Cost ${money(item.weightedCost)} • Sticker ${money(item.stickerPrice)}`; const form=document.getElementById("sellForm"); form.elements.quantitySold.value=1; form.elements.soldPrice.value=item.stickerPrice||item.marketValue||0; form.elements.fee.value=0; }
    function editItem(itemId){ goTab("inventory"); setTimeout(()=>{ const item=state.inventory.find(i=>i.id===itemId), form=document.getElementById("itemForm"); if(!item||!form)return; form.elements.editingId.value=item.id; form.elements.name.value=item.name||""; form.elements.category.value=item.category||"Other"; form.elements.lotId.value=item.lotId||""; form.elements.quantity.value=item.quantity||1; form.elements.weightedCost.value=item.weightedCost||0; form.elements.marketValue.value=item.marketValue||0; form.elements.stickerPrice.value=item.stickerPrice||0; form.elements.notes.value=item.notes||""; document.getElementById("itemFormTitle").textContent="Edit Inventory"; document.getElementById("saveItemBtn").textContent="Save Changes"; document.getElementById("cancelEditBtn").classList.remove("hidden"); scrollTo({top:0,behavior:"smooth"}); },50); }
    function deleteItem(itemId){ const item=state.inventory.find(i=>i.id===itemId); if(item&&confirm(`Delete "${item.name}"?`)){ state.inventory=state.inventory.filter(i=>i.id!==itemId); state.sales=state.sales.filter(s=>s.itemId!==itemId); render(); } }
    function addToLot(lotId){ goTab("inventory"); setTimeout(()=>{ const form=document.getElementById("itemForm"); if(form){ form.elements.lotId.value=lotId; form.elements.weightedCost.value=0; scrollTo({top:0,behavior:"smooth"}); } },50); }
    function viewLot(lotId){ const lot=state.lots.find(l=>l.id===lotId), items=lotItems(lotId), remaining=items.reduce((s,i)=>s+Number(i.marketValue||0)*Number(i.quantity||0),0); alert(`${lot.name}\nItems: ${items.length}\nRemaining market: ${money(remaining)}`); }
    function deleteLot(lotId){ const lot=state.lots.find(l=>l.id===lotId); if(lot&&confirm(`Delete ${lot.name}? Items stay but lose lot link.`)){ state.lots=state.lots.filter(l=>l.id!==lotId); state.inventory.forEach(i=>{ if(i.lotId===lotId){i.lotId=""; i.lotName="";} }); render(); } }
    function endShow(){ 
      if(!state.activeShow){ alert("No active show to end."); return; } 
      const sales=currentSales();
      const revenue=sales.reduce((s,x)=>s+saleRevenue(x),0);
      const paymentFees=sales.reduce((s,x)=>s+Number(x.fee||0),0);
      const cogs=sales.reduce((s,x)=>{
        const item=state.inventory.find(i=>i.id===x.itemId);
        return s + Number(item?.weightedCost||0)*Number(x.quantitySold||1);
      },0);
      const tableFee=Number(state.activeShow.tableFee||0);
      const netProfit=revenue-cogs-paymentFees-tableFee;

      const payments=sales.reduce((m,x)=>{m[x.paymentMethod]=(m[x.paymentMethod]||0)+saleRevenue(x); return m;},{});
      const cats=sales.reduce((m,x)=>{ const item=state.inventory.find(i=>i.id===x.itemId), c=item?.category||"Unknown"; m[c]=(m[c]||0)+Number(x.quantitySold||1); return m;},{});
      const paymentText=Object.entries(payments).map(([k,v])=>`- ${k}: ${money(v)}`).join("
")||"- No payments";
      const catText=Object.entries(cats).map(([k,v])=>`- ${k}: ${v} sold`).join("
")||"- No sales";
      const itemsSold=sales.reduce((s,x)=>s+Number(x.quantitySold||1),0);
      const avgProfit=itemsSold ? netProfit/itemsSold : 0;

      const text=`${state.activeShow.name} Report
Location: ${state.activeShow.location||"N/A"}
Date: ${today()}

Revenue: ${money(revenue)}
Items Sold: ${itemsSold}

Cost of Goods Sold: -${money(cogs)}
Payment Fees: -${money(paymentFees)}
Table Fee: -${money(tableFee)}

Net Profit: ${money(netProfit)}
Average Profit Per Item: ${money(avgProfit)}
Remaining Inventory Value: ${money(invMarket())}

Payment Breakdown:
${paymentText}

Category Breakdown:
${catText}`;

      state.reports.unshift({id:id(),showId:state.activeShow.id,text,createdAt:new Date().toISOString()});
      state.activeShow=null;
      goTab("reports");
    }

    function duplicateItem(itemId){
      const item=state.inventory.find(i=>i.id===itemId);
      if(!item) return;
      const copy={...item,id:id(),name:item.name+" copy",quantity:Number(item.quantity||1),createdAt:new Date().toISOString(),notes:(item.notes?item.notes+" • ":"")+"Duplicated"};
      state.inventory.push(copy);
      render();
    }

    function deleteActiveShow(){
      if(!state.activeShow){ alert("No active show to delete."); return; }
      if(confirm(`Delete active show "${state.activeShow.name}" and its sales?`)){
        const showId=state.activeShow.id;
        state.sales=state.sales.filter(s=>s.showId!==showId);
        state.activeShow=null;
        render();
      }
    }

    function deleteReport(reportId){
      if(confirm("Delete this report?")){
        state.reports=state.reports.filter(r=>r.id!==reportId);
        render();
      }
    }

    function clearReports(){
      if(!state.reports.length){ alert("No reports to clear."); return; }
      if(confirm("Delete all reports?")){
        state.reports=[];
        render();
      }
    }

    function clearSalesOnly(){
      if(confirm("Clear all sales, reports, and active show? Inventory and lots will stay.")){
        state.sales=[];
        state.reports=[];
        state.activeShow=null;
        render();
      }
    }

    function factoryReset(){
      if(confirm("Factory reset VendorVault? This deletes inventory, lots, shows, sales, and reports.")){
        localStorage.removeItem(STORAGE_KEY);
        state=structuredClone(defaultState);
        render();
      }
    }

    function exportBackup(){ const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"}), url=URL.createObjectURL(blob), a=document.createElement("a"); a.href=url; a.download=`vendorvault-backup-${new Date().toISOString().slice(0,10)}.json`; a.click(); URL.revokeObjectURL(url); }

    render();
  </script>
</body>
</html>
